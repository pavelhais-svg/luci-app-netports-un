<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="WiFi Signal Up WOW Teal Standalone">
  <defs>
    <radialGradient id="tealBodyGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2dd4bf"/> <stop offset="100%" stop-color="#004d55"/> </radialGradient>

    <filter id="intenseTealGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08  0 0 0 0 0.72  0 0 0 0 0.65  0 0 0 1 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .signal-wave { animation: wave 1.8s infinite ease-in-out; opacity: 0.4; }
      .delay-1 { animation-delay: 0.0s; }
      .delay-2 { animation-delay: 0.3s; }
      .delay-3 { animation-delay: 0.6s; }
      @keyframes wave {
        0% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
        100% { opacity: 0.4; transform: scale(1); }
      }
    </style>
  </defs>

  <g filter="url(#intenseTealGlow)" transform="translate(16 16)">
    
    <circle cx="0" cy="8" r="2.5" fill="url(#tealBodyGrad)" stroke="none"/>
    
    <g fill="none" stroke="url(#tealBodyGrad)" stroke-linecap="round">
      <path d="M-4 4 q4 -3 8 0" stroke-width="2" class="signal-wave delay-1"/>
      
      <path d="M-7 0 q7 -5 14 0" stroke-width="2.2" class="signal-wave delay-2"/>
      
      <path d="M-10 -4 q10 -7 20 0" stroke-width="2.4" class="signal-wave delay-3"/>
    </g>
  </g>
</svg>